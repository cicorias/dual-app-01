[tools]
uv = "latest"
python = "3.12"

[tasks.sync]
description = "Install root dev venv (Databricks Connect) + both apps' dependencies with uv"
run = [
  "uv sync",
  "uv run --no-project scripts/sync.py",
]

[tasks.sync-root]
description = "Create/refresh the root .venv (Databricks Connect) used by the VS Code extension"
run = "uv sync"

[tasks.gen-local-config]
description = "Generate databricks.local.yml from the Databricks profile host (DATABRICKS_CONFIG_PROFILE or 'dev'). Use --force to overwrite."
run = "uv run --no-project scripts/gen_local_config.py"

[tasks.run-app-b]
description = "Run App B (Databricks backend) locally on port 8001"
dir = "app-b-backend"
env = { DATABRICKS_APP_PORT = "8001", DATABRICKS_WAREHOUSE_ID = "5a6d583dd36d089a", GENIE_SPACE_ID = "01f12d30ddc31b1f9b6afd01e8c027ab", DEMO_SECRET_SCOPE = "dual-app-demo", DEMO_SECRET_KEY = "greeting" }
run = "uv run uvicorn app:app --host 0.0.0.0 --port 8001"

[tasks.run-app-a]
description = "Run App A (frontend + proxy) locally on port 8000, proxying to App B on 8001"
dir = "app-a-frontend"
env = { DATABRICKS_APP_PORT = "8000", APP_B_URL = "http://127.0.0.1:8001" }
run = "uv run uvicorn app:app --host 0.0.0.0 --port 8000"

[tasks.install-databricks-skills]
description = "Install ALL Databricks agent skills (project, symlinked) for github-copilot and claude-code"
run = "uv run --no-project scripts/install_databricks_skills.py"

[tasks.update-databricks-skills]
description = "Update all installed Databricks agent skills (project scope) to their latest versions"
run = [
  "uv run --no-project scripts/update_databricks_skills.py",
  "uv run --no-project scripts/apply_skill_overrides.py",
]

[tasks.apply-skill-overrides]
description = "Re-apply project-local (env-5 / Python 3.12) overrides onto vendored Databricks skills"
run = "uv run --no-project scripts/apply_skill_overrides.py"

[tasks.install-ai-dev-kit-skills]
description = "Install selected Databricks skills from databricks-solutions/ai-dev-kit for github-copilot and claude-code"
run = "uv run --no-project scripts/install_ai_dev_kit_skills.py"
