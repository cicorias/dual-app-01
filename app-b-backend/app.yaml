command:
  - uv
  - run
  - uvicorn
  - app:app
  - --host
  - "0.0.0.0"
  - --port
  - "${DATABRICKS_APP_PORT}"
env:
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse
  - name: GENIE_SPACE_ID
    valueFrom: genie-space
  - name: DEMO_SECRET_SCOPE
    value: "dual-app-demo"
  - name: DEMO_SECRET_KEY
    value: "greeting"
